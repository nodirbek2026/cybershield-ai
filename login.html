<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield AI — Kirish</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.1);padding:36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.logo-icon{width:36px;height:36px;background:#0F6E56;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:17px;font-weight:600;color:#1a1a1a}
.tabs{display:flex;background:#f0f0f0;border-radius:8px;padding:3px;margin-bottom:24px}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:6px;font-size:14px;cursor:pointer;color:#6b6b6b;transition:all .18s}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500}
.form{display:flex;flex-direction:column;gap:12px}
.input{padding:11px 14px;border-radius:8px;border:1px solid rgba(0,0,0,0.15);font-size:14px;color:#1a1a1a;outline:none;transition:border-color .2s;width:100%}
.input:focus{border-color:#0F6E56}
.btn{padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;width:100%}
.btn-green{background:#0F6E56;color:#fff}
.btn-green:hover{opacity:.88}
.btn-google{background:#fff;color:#1a1a1a;border:1px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-google:hover{background:#f7f8f6}
.divider{display:flex;align-items:center;gap:10px;color:#9a9a9a;font-size:12px;margin:4px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(0,0,0,0.1)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;display:none;margin-top:4px}
.msg.error{background:#FCEBEB;color:#9b1c1c;display:block}
.msg.success{background:#E1F5EE;color:#0a5c47;display:block}
.back{text-align:center;margin-top:16px;font-size:13px;color:#6b6b6b}
.back a{color:#0F6E56;text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <span class="logo-text">CyberShield AI</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Kirish</button>
    <button class="tab" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
  </div>

  <div id="login-form" class="form">
    <input class="input" type="email" id="login-email" placeholder="Email manzilingiz">
    <input class="input" type="password" id="login-pass" placeholder="Parol">
    <button class="btn btn-green" onclick="loginEmail()">Kirish</button>
    <div class="divider">yoki</div>
    <button class="btn btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google bilan kirish
    </button>
    <div class="msg" id="login-msg"></div>
  </div>

  <div id="register-form" class="form" style="display:none">
    <input class="input" type="text" id="reg-name" placeholder="Ismingiz">
    <input class="input" type="email" id="reg-email" placeholder="Email manzilingiz">
    <input class="input" type="password" id="reg-pass" placeholder="Parol (kamida 6 belgi)">
    <button class="btn btn-green" onclick="registerEmail()">Ro'yxatdan o'tish</button>
    <div class="divider">yoki</div>
    <button class="btn btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google bilan ro'yxatdan o'tish
    </button>
    <div class="msg" id="reg-msg"></div>
  </div>

  <div class="back"><a href="/">← Bosh sahifaga qaytish</a></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyAtFpWFp9vbe1PCZzOqGFE8wpYB5_MyreU",
  authDomain: "cybershield-ai-dccb3.firebaseapp.com",
  projectId: "cybershield-ai-dccb3",
  storageBucket: "cybershield-ai-dccb3.firebasestorage.app",
  messagingSenderId: "881165366846",
  appId: "1:881165366846:web:a644b7dd3c04a1815e436f",
  measurementId: "G-ZCWNMQDC9T"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
}

window.loginEmail = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showMsg('login-msg', 'Email va parolni kiriting!', 'error');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showMsg('login-msg', 'Muvaffaqiyatli kirdingiz! Yo\'naltirilmoqda...', 'success');
    setTimeout(() => window.location.href = '/', 1200);
  } catch(e) {
    const msgs = { 'auth/user-not-found': 'Foydalanuvchi topilmadi.', 'auth/wrong-password': 'Parol noto\'g\'ri.', 'auth/invalid-email': 'Email noto\'g\'ri formatda.' };
    showMsg('login-msg', msgs[e.code] || 'Xatolik yuz berdi.', 'error');
  }
}

window.registerEmail = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) return showMsg('reg-msg', 'Barcha maydonlarni to\'ldiring!', 'error');
  if (pass.length < 6) return showMsg('reg-msg', 'Parol kamida 6 belgi bo\'lishi kerak!', 'error');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    showMsg('reg-msg', 'Muvaffaqiyatli ro\'yxatdan o\'tdingiz!', 'success');
    setTimeout(() => window.location.href = '/', 1200);
  } catch(e) {
    const msgs = { 'auth/email-already-in-use': 'Bu email allaqachon ro\'yxatdan o\'tgan.', 'auth/invalid-email': 'Email noto\'g\'ri formatda.', 'auth/weak-password': 'Parol juda zaif.' };
    showMsg('reg-msg', msgs[e.code] || 'Xatolik yuz berdi.', 'error');
  }
}

window.loginGoogle = async function() {
  try {
    await signInWithPopup(auth, provider);
    window.location.href = '/';
  } catch(e) {
    showMsg('login-msg', 'Google orqali kirishda xatolik.', 'error');
    showMsg('reg-msg', 'Google orqali kirishda xatolik.', 'error');
  }
}
</script>
</body>
</html>
